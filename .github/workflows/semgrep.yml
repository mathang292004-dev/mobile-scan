name: Semgrep Security Scan (With Free UI Dashboard)

on:
  push:
    branches: ["main", "emergeX_dev"]
  pull_request:

jobs:
  semgrep:
    name: Semgrep Scan - View Results in UI
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # NO Flutter setup needed!
      # NO dart pub get needed!
      # Semgrep scans source code directly

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep CI
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: semgrep ci