name: Semgrep Security Scan (With Free UI Dashboard)

on:
  push:
    branches: ["main", "emergeX_dev"]
  pull_request:

jobs:
  semgrep:
    name: Semgrep Scan - View Results in UI
    runs-on: ubuntu-latest
    
    # Required permissions for PR comments and UI integration
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Flutter (not just Dart)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'  # Use your Flutter version
          channel: 'stable'

      # Get Flutter dependencies
      - name: Get Flutter dependencies
        run: flutter pub get

      # Install Semgrep
      - name: Install Semgrep
        run: pip install semgrep

      # Run Semgrep CI - This will upload results to the UI dashboard
      - name: Run Semgrep CI
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: semgrep ci