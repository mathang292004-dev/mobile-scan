name: Semgrep Security Scan

on:
  push:
    branches: [ "main" ]

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep with Custom Rules
        run: semgrep scan --config .semgrep/dart-rules.yml .