workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "emergeX_dev"'
      when: always
    - when: never

stages:
  - sonar
  

sonarqube-check:
  stage: sonar
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
      
  script:
    - sonar-scanner -Dsonar.projectKey="$SONAR_PROJECT_KEY" -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN" -Dsonar.sources=android,lib,ios,linux,macos,test,web,windows -Dsonar.verbose=true 

  rules:
    - if: '$CI_COMMIT_BRANCH == "emergeX_dev"'
      when: always
    - when: never